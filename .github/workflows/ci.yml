name: CI

# Qualitäts-Gate aus der Verfassung (Prinzip IV): Build, Lint, Typecheck und Tests müssen
# grün sein. Läuft bei jedem Push und Pull Request auf main; ein roter Lauf blockiert den
# Merge (sofern Branch Protection die Checks "required" macht — siehe Hinweis im PR/README).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Laufende Läufe für denselben Branch/PR abbrechen, wenn neue Commits kommen.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  engine:
    name: engine (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run --workspace packages/engine lint

      - name: Typecheck
        run: npm run --workspace packages/engine typecheck

      - name: Test
        run: npm run --workspace packages/engine test

      - name: Build
        run: npm run --workspace packages/engine build

  web:
    name: web (lint · build · typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Cache des Next.js-Builds (beschleunigt aufeinanderfolgende Läufe).
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: packages/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('packages/web/**/*.ts', 'packages/web/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Lint
        run: npm run --workspace packages/web lint

      # Build vor Typecheck: erzeugt next-env.d.ts und prüft, dass die App kompiliert.
      - name: Build
        run: npm run --workspace packages/web build

      - name: Typecheck
        run: npm run --workspace packages/web typecheck

      - name: Test
        run: npm run --workspace packages/web test

  server:
    name: server (lint · typecheck · test · build)
    runs-on: ubuntu-latest

    # Echte Postgres für die Integrationstests (Auth-Flow, Stats-Schreibpfad, Idempotenz).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: schiffe
          POSTGRES_PASSWORD: schiffe
          POSTGRES_DB: schiffe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U schiffe -d schiffe"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://schiffe:schiffe@localhost:5432/schiffe?schema=public
      COOKIE_SECRET: ci-cookie-secret
      GUEST_TOKEN_SECRET: ci-guest-secret

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run --workspace packages/server prisma:generate

      # Committete Migrationen auf die Test-DB anwenden.
      - name: Apply database migrations
        run: npm run --workspace packages/server prisma:deploy

      - name: Lint
        run: npm run --workspace packages/server lint

      - name: Typecheck
        run: npm run --workspace packages/server typecheck

      - name: Test
        run: npm run --workspace packages/server test

      - name: Build
        run: npm run --workspace packages/server build
